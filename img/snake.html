<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>RNG Arena — Мини-игра Змейка</title>
    <style>
        :root {
            --bg-main: #0f1113;
            --bg-card: #1a1d20;
            --bg-nav: #23272a;
            --accent: #4f9d5d;
            --accent-glow: rgba(79, 157, 93, 0.3);
            --text-main: #f0f2f5;
            --text-muted: #9aa0a6;
        }

        body {
            font-family: 'Segoe UI', Inter, system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation; /* Убирает задержку клика на мобилках */
        }

        header {
            background-color: var(--bg-card);
            width: 100%;
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--accent);
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 440px;
            box-sizing: border-box;
        }

        .score-box {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Игровое поле */
        canvas {
            background-color: #0b0c0e;
            border: 2px solid var(--bg-nav);
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        /* Блок сенсорных стрелочек */
        .controls-container {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 10px;
            width: 180px;
            margin-top: 10px;
        }

        .btn-arrow {
            background-color: var(--bg-nav);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 24px;
            font-weight: bold;
            width: 55px;
            height: 55px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-arrow:active {
            background-color: var(--accent);
            color: var(--bg-main);
            transform: scale(0.95);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Расстановка кнопок по сетке */
        .btn-up { grid-area: up; }
        .btn-left { grid-area: left; }
        .btn-right { grid-area: right; }
        .btn-down { grid-area: down; }

        /* Кнопка сброса при проигрыше */
        #restartBtn {
            display: none;
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
    </style>
</head>
<body>

    <header>
        <h1>RNG Arena: Змейка</h1>
    </header>

    <main>
        <div class="score-box">Счёт: <span id="score">0</span></div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <button id="restartBtn" onclick="resetGame()">Играть снова</button>

        <!-- Джойстик для мобилок и ПК -->
        <div class="controls-container">
            <button class="btn-arrow btn-up" onclick="changeDirection('up')">▲</button>
            <button class="btn-arrow btn-left" onclick="changeDirection('left')">◀</button>
            <button class="btn-arrow btn-right" onclick="changeDirection('right')">▶</button>
            <button class="btn-arrow btn-down" onclick="changeDirection('down')">▼</button>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, dx, dy, score, gameInterval, gameOver;

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            food = getRandomFoodPosition();
            dx = 1; // Изначально ползет вправо
            dy = 0;
            score = 0;
            gameOver = false;
            scoreElement.innerText = score;
            restartBtn.style.display = 'none';
            
            clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 100);
        }

        function updateGame() {
            if (gameOver) return;

            // Передвигаем голову змейки
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Проверка столкновения со стенами или хвостом
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkCollision(head)) {
                endGame();
                return;
            }

            // Добавляем новую голову в начало массива
            snake.unshift(head);

            // Проверка: съела ли еду
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                food = getRandomFoodPosition();
            } else {
                // Если еду не съели, убираем последний элемент хвоста
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Очистка поля
            ctx.fillStyle = '#0b0c0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем еду (красный мифический цвет)
            ctx.fillStyle = '#e74c3c';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(231, 76, 60, 0.5)';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Рисуем змейку (зеленый акцентный цвет)
            ctx.fillStyle = '#4f9d5d';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(79, 157, 93, 0.4)';
            snake.forEach((part, index) => {
                // Голова чуть ярче хвоста
                ctx.fillStyle = index === 0 ? '#62c274' : '#4f9d5d';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            // Сброс тени, чтобы не тормозило
            ctx.shadowBlur = 0; 
        }

        function checkCollision(head) {
            return snake.some((part, index) => index !== 0 && part.x === head.x && part.y === head.y);
        }

        function getRandomFoodPosition() {
            let newFoodPosition;
            while (!newFoodPosition || snake.some(part => part.x === newFoodPosition.x && part.y === newFoodPosition.y)) {
                newFoodPosition = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            }
            return newFoodPosition;
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameInterval);
            
            ctx.fillStyle = 'rgba(15, 17, 19, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 24px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('ИГРА ОКОНЧЕНА', canvas.width / 2, canvas.height / 2 - 10);
            
            restartBtn.style.display = 'block';
        }

        // Общая функция смены направления (для кнопок экрана и клавиатуры)
        function changeDirection(dir) {
            if (gameOver) return;
            
            if (dir === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (dir === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'right' && dx === 0) { dx = 1; dy = 0; }
            if (dir === 'down' && dy === 0) { dx = 0; dy = 1; }
        }

        // Управление с клавиатуры на ПК
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'А') changeDirection('left');
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'Ц') changeDirection('up');
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'В') changeDirection('right');
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'Ы') changeDirection('down');
        });

        // Запуск игры при открытии
        resetGame();
    </script>
</body>
  </html>
